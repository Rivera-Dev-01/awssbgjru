<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AWS Student Builder Group Members - Meet our founders, executives, and associates"
    />
    <title>AWS Student Builder Group - Members</title>
    <link
      rel="icon"
      type="image/png"
      href="../assets/shared/components/AWS-NewLogo.webp"
    />
    <meta property="og:title" content="AWS Student Builder Group - Members" />
    <meta property="og:description" content="Meet the founders, executives, and associates of AWS Student Builder Group JRU Chapter" />
    <meta property="og:image" content="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:url" content="https://awslearningclub.jru/members" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800;900&family=Lexend:wght@300;400;500;600;700&family=Lexend+Deca:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/members.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="../css/chatbot.css" media="print" onload="this.media='all'" />
  </head>
  <body class="members-page">
    <div id="header-placeholder"></div>

    <main id="main-content">
      <!-- SHARED SIDEBAR (visible on all sections) -->
      <aside class="members-sidebar">
        <h2 class="sidebar-title">Members</h2>

        <nav class="sidebar-nav">
          <a href="#" class="sidebar-nav-item active" data-section="members">
            <span class="sidebar-nav-indicator"></span>
            <img src="../assets/members/badges/Members-Active-State-Badge.png" alt="" class="sidebar-nav-icon" />
            <span class="sidebar-nav-label">Membership</span>
          </a>
          <a href="#" class="sidebar-nav-item" data-section="founders">
            <span class="sidebar-nav-indicator"></span>
            <img src="../assets/members/badges/Founders-Inactive-State-Badge.png" alt="" class="sidebar-nav-icon" />
            <span class="sidebar-nav-label">Founders</span>
          </a>
          <a href="#" class="sidebar-nav-item" data-section="executives">
            <span class="sidebar-nav-indicator"></span>
            <img src="../assets/members/badges/Executives-Inactive-State-Badge.png" alt="" class="sidebar-nav-icon" />
            <span class="sidebar-nav-label">Executives</span>
          </a>
          <a href="#" class="sidebar-nav-item" data-section="associates">
            <span class="sidebar-nav-indicator"></span>
            <img src="../assets/members/badges/Associate-Inactive-State-Badge.png" alt="" class="sidebar-nav-icon" />
            <span class="sidebar-nav-label">Associates</span>
          </a>
        </nav>

        <div class="sidebar-card">
          <div class="sidebar-card-badge">
            <img src="../assets/members/badges/Grow-Learn-Lead-Badge.png" alt="" class="sidebar-card-badge-img" />
          </div>
          <p class="sidebar-card-title">Grow. learn. lead</p>
          <p class="sidebar-card-subtitle">Together, we build the future with AWS</p>
        </div>
      </aside>

      <!-- ── SECTION 1: HERO ── -->
      <section class="snap-section active-section" id="section-hero">
        <div class="members-layout">
          <!-- HERO CARD -->
          <div class="hero-card">
            <!-- Search bar -->
            <div class="member-title-mobile">Members</div>
            <div class="hero-search">
              <div class="hero-search-icon">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                  <circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.5"/>
                  <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <input type="text" class="hero-search-input" placeholder="Search ID..." />
            </div>

            <!-- Hero text content -->
            <div class="hero-content">
              <h1 class="hero-title">IT'S ALWAYS DAY ONE</h1>
              <p class="hero-subtitle">AWS Student Builder Group - Jru Ch</p>
              <div class="hero-accent-line"></div>
              <p class="hero-description">Join a community of builders, learners, and dreamers shaping the future together.</p>
              <p class="hero-cta-text">Want to be a <span class="hero-cta-highlight">member</span>?</p>
              <a href="/register" class="hero-btn-register">
                Register
                <span class="hero-btn-arrow">
                  <svg width="19" height="19" viewBox="0 0 19 19" fill="none">
                    <path d="M5.5 13.5L13.5 5.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 5.5H13.5V12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>

                <span class="hero-btn-arrow-mobile">
                <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
                  <path d="M3 4.5L9.5 9.5L3 14.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M10.5 4.5L17 9.5L10.5 14.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              </a>
            </div>
            <img src="../assets/members/Mascot/Hima-Hero-Mascot.webp" alt="" class="hero-mascot" />
          </div>
        </div>
      </section>

      <!-- ── SECTION 2: FOUNDERS ── -->
      <section class="snap-section" id="section-founders">
        <div class="members-layout">
          <div class="founders-content">
            <div class="founders-subsections">
            </div>
          </div>
        </div>
      </section>

      <!-- ── SECTION 3: EXECUTIVES ── -->
      <section class="snap-section" id="section-executives">
        <div class="members-layout">
          <div class="founders-content">
            <div class="founders-subsections">
            </div>
          </div>
        </div>
      </section>

      <!-- ── SECTION 4: ASSOCIATES ── -->
      <section class="snap-section" id="section-associates">
        <div class="members-layout">
          <div class="founders-content">
            <div class="founders-subsections">
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <div id="chatbot-placeholder"></div>
    <script src="../js/main.js"></script>
    <script src="../js/nav.js" defer></script>
    <script src="../js/chatbot.js" defer></script>
    <script src="../js/members.js" defer></script>
  </body>
</html>
