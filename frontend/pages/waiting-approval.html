<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AWS Learning Club - Registration Complete" />
    <title>AWS Learning Club - Waiting for Approval</title>
    <link rel="icon" type="image/png" href="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:title" content="AWS Learning Club - Waiting for Approval" />
    <meta property="og:description" content="Your AWS SGB - JRU membership application has been submitted" />
    <meta property="og:image" content="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:url" content="https://awslearningclub.jru/waiting-approval" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/register.css" />
    <link rel="stylesheet" href="../css/waiting-approval.css" />
  </head>
  <body class="register-page">
    <main class="register-main">
      <div class="register-card">

        <div class="register-progress">
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
          <div class="progress-line filled"></div>
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
          <div class="progress-line filled"></div>
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
        </div>

        <div class="approval-content">
          <div class="approval-checkmark"></div>
          <h1 class="approval-title">Congratulations!</h1>
          <p class="approval-message">
            Your application has been successfully approved. Please expect a detailed email shortly containing your complete membership information. We look forward to welcoming you.
          </p>
          <div class="approval-actions">
            <a href="../index.html" class="approval-badge">
              <div class="badge-circle"></div>
              <div class="badge-icon"></div>
            </a>
            <a href="members.html" class="btn-members">
              <span class="btn-members-text">Proceed to members</span>
              <span class="btn-arrow"></span>
            </a>
          </div>
        </div>

      </div>
    </main>
    <script src="../js/waiting-approval.js"></script>
  </body>
