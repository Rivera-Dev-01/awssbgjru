<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AWS Learning Club Events - Upcoming workshops and past events"
    />
    <title>AWS Learning Club - Events</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/chatbot.css" />
  </head>
  <body class="about-page">
    <div id="header-placeholder"></div>

    <main>
      <div class="events-cloud-bg">
        <img 
          src="../assets/events/intro-cloud.webp"
          alt="Cloud Background"
          class="events-cloud-img"
        / loading="lazy">
      </div>
      <div class="events-header-container">
        <h1 class="events-header">Events</h1>
      </div>

      <div class="events-content">
        <h2 class="events-title">Events</h2>
        <p class="events-description">
          "Where in AWS, It's Always Day One, the moment ambition meets action
          the single step that transforms a distant dream into your daily
          reality."
        </p>
      </div>

      <div class="events-container" id="events-container"></div>
      <button class="view-all-btn">View All Events</button>
    </main>

    <div id="footer-placeholder"></div>

    <div id="chatbot-placeholder"></div>
    <script src="../js/main.js"></script>
    <script type="module" src="../js/events.js"></script>
    <script src="../js/nav.js" defer></script>
    <script src="../js/chatbot.js" defer></script>
  </body>
</html>
