<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AWS Student Builder Group Registration - Why you want to be a member" />
    <title>AWS Student Builder Group - Explanation</title>
    <link rel="icon" type="image/png" href="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:title" content="AWS Student Builder Group - Explanation" />
    <meta property="og:description" content="Tell us why you want to join AWS Student Builder Group - JRU Chapter" />
    <meta property="og:image" content="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:url" content="https://awslearningclub.jru/explanation" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Lexend:wght@300;400;500;600;700&family=Lexend+Deca:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/register.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/explanation.css" />
    <script defer src="../js/main.js"></script>
    <script defer src="../js/nav.js"></script>
  </head>
  <body class="register-page register-step-2">
    <main class="register-main">
      <!-- Header component container for mobile menu -->
      <div id="header-placeholder"></div>
      <div class="register-card">

        <!-- Back button -->
        <a href="/register" class="register-back">
          <span class="register-back-arrow"></span>
          <span class="register-back-text">Back</span>
        </a>

        <!-- Title -->
        <h1 class="register-title">Sign up</h1>

        <!-- Progress steps: step 1 completed, step 2 current, step 3 upcoming -->
        <div class="register-progress">
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
          <div class="progress-line filled"></div>
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
          <div class="progress-line"></div>
          <div class="progress-step">
            <div class="progress-circle"></div>
          </div>
        </div>

        <!-- Section title -->
        <h2 class="register-section-title explanation-section-title">Why do you want to be a member of AWS - JRU?</h2>

        <!-- Explanation textarea -->
        <div class="explanation-box">
          <div class="form-group">
            <textarea class="explanation-textarea" id="explanationText" placeholder="Explain here." maxlength="5000"></textarea>
            <div class="form-error" data-for="explanation">
              <span class="error-icon"></span>
              <span class="error-text">Please input a brief explanation</span>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <div class="form-submit-row explanation-submit-row">
          <button type="submit" class="btn-save" id="btnSave">Save &amp; Continue</button>
        </div>

      </div>
    </main>
    <script src="../js/explanation.js"></script>
  </body>
</html>
