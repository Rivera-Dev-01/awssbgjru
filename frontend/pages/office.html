<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AWS Student Builder Group Registration - Choose an Office Division" />
    <title>AWS Student Builder Group - Office Division</title>
    <link rel="icon" type="image/png" href="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:title" content="AWS Student Builder Group - Office Division" />
    <meta property="og:description" content="Choose your Office Division at AWS Student Builder Group - JRU Chapter" />
    <meta property="og:image" content="../assets/shared/components/AWS-NewLogo.webp" />
    <meta property="og:url" content="https://awslearningclub.jru/office" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Lexend:wght@300;400;500;600;700&family=Lexend+Deca:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/register.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/department.css" />
    <link rel="stylesheet" href="../css/office.css" />
    <script defer src="../js/main.js"></script>
    <script defer src="../js/nav.js"></script>
  </head>
  <body class="register-page register-step-dept">
    <main class="register-main">
      <!-- Header component container for mobile menu -->
      <div id="header-placeholder"></div>
      <div class="register-card">

        <!-- Back button -->
        <a href="/department" class="register-back">
          <span class="register-back-arrow"></span>
          <span class="register-back-text">Back</span>
        </a>

        <h1 class="register-title">Sign up</h1>

        <div class="register-progress">
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
          <div class="progress-line filled"></div>
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
          <div class="progress-line filled"></div>
          <div class="progress-step">
            <div class="progress-circle filled"></div>
          </div>
        </div>

        <div class="office-content">
          <h2 class="office-section-title">OFFICES : Choose a Office Division</h2>
          <div class="office-grid">
            <button class="office-pill" data-division="Relations">Relations</button>
            <button class="office-pill" data-division="Operations">Operations</button>
            <button class="office-pill" data-division="Technology">Technology</button>
            <button class="office-pill" data-division="Creatives">Creatives</button>
            <button class="office-pill" data-division="Marketing">Marketing</button>
            <button class="office-pill" data-division="Media">Media</button>
          </div>
          <div class="form-error office-error" data-for="office">
            <span class="error-icon"></span>
            <span class="error-text">To proceed, please select a Office Division</span>
          </div>
          <div class="form-error office-error-api" data-for="office-api">
            <span class="error-icon"></span>
            <span class="error-text">Something went wrong. Please check your connection and try again.</span>
          </div>
          <div class="form-submit-row office-submit-row">
            <button type="submit" class="btn-save" id="btnSaveOffice">Submit</button>
          </div>
        </div>

      </div>
    </main>
    <script src="../js/office.js"></script>
  </body>
</html>
