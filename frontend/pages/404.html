<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Learning Club – Page Not Found</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Lexend:wght@400;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/footer.css" media="print" onload="this.media='all'">
  <script src="../js/main.js"></script>
  <script src="../js/nav.js" defer></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Poppins",sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;color:#1c3466}
    .error-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 20px 60px;text-align:center}
    .error-code{font-family:"Montserrat",sans-serif;font-size:clamp(80px,15vw,160px);font-weight:900;background:linear-gradient(135deg,#f2af00,#ff6f08);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .error-title{font-size:clamp(24px,4vw,36px);font-weight:700;margin:16px 0 8px}
    .error-desc{font-size:clamp(14px,2vw,18px);color:#666;max-width:480px;line-height:1.6;margin-bottom:32px}
    .error-btn{display:inline-block;padding:14px 40px;border-radius:12px;background:linear-gradient(135deg,#f2af00,#ff6f08);color:#fff;font-weight:700;font-size:16px;text-decoration:none;transition:transform .2s,box-shadow .2s}
    .error-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(242,175,0,.3)}
    @media(max-width:768px){.error-section{padding:100px 16px 40px}}
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="error-section">
    <div class="error-code">404</div>
    <h1 class="error-title">Lost in the Cloud?</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on course.</p>
    <a href="/" class="error-btn">Back to Home</a>
  </main>
  <div id="footer-placeholder"></div>
</body>
</html>
